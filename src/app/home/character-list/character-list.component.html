<ul class="character-list">
  <li *ngFor="let character of characters" (click)="onCharacterClick(character.id)" class="character">
    <div class="character-image">
      <img [src]="character.image" alt="{{ character.name }}">
    </div>
    <div class="character-info">
      <h3>{{ character.name }}</h3>
      <div class="info-block">
        <p>{{ character.species }}</p>
        <p>
          <span class="status-circle" [ngClass]="{
            'status-alive': character.status === 'Alive',
            'status-dead': character.status === 'Dead',
            'status-unknown': character.status === 'unknown'
          }"></span>
          {{ character.status }}
        </p>
        <p>{{ character.gender }}</p>
      </div>
    </div>
  </li>
</ul>
